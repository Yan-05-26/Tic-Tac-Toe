<!DOCTYPE html>
<html lang="de">

<head>
  <title>Ex9 Tic Tac Toe</title>
  <meta charset="utf-8">
  <style>
    *
    {
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      text-align: center;
      color: white;
    }

    body
    {
      background-color: black;
    }

    p
    {
      height: 30px;

      color: black;
      font-size: 50px;
      font-family: 'Courier New', Courier, monospace;
    }

    h1
    {
      font-size: 50px;
      font-family: 'Courier New', Courier, monospace;

      text-shadow: 0 0 25px white;
    }

    input
    {
      margin: 50px;
      background-color: rgb(0, 0, 0);
      border-color: white;
      border-radius: 5px;
      width: 200px;
      height: 50px;

      color: white;
      font-size: 25px;
      font-family: 'Courier New', Courier, monospace;
    }

    input:hover
    {
      background-color: white;
      border-color: black;
      box-shadow: 0 0 25px white;

      color: black;
    }

    td 
    {
      border: 1px solid black;
      width: 125px;
      height: 125px;
      z-index: 0;
    }

    td:not(.used, .win):hover
    {
      background-image: linear-gradient(to bottom, rgb(255, 255, 233), rgb(255, 255, 187), rgb(255, 255, 98));
      box-shadow: 0 0 25px yellow;
    }

    .used
    {
      background-color: rgb(200, 200, 200);
    }

    .win
    {
      background-image: linear-gradient(45deg, rgb(255, 0, 0), rgb(255, 187, 187), rgb(255, 98, 98));
      box-shadow: 0 0 50px rgb(255, 20, 20);
      z-index: 9;
    }
    
    td img 
    {
      display: block;
      margin-left: auto;
      margin-right: auto;
      width: 50px;
      height: 50px;
      z-index: 10;
    }

    tr 
    {
      width: 125px;
      height: 125px;
      border: 1px solid black;
    }

    table 
    {
      margin-left: auto;
      margin-right: auto;
      width: 375px;
      height: 375px;
      border: 1px solid black;
      border-collapse: collapse;
      background-color: white;

      box-shadow: 5px 5px 2px black;
    }

  </style>
</head>

<body style="background-color:smokewhite">
  <!-- Insert the basic DOM Elements, that you want to use, h2-Header, table...-->
  <h1>TicTocToe</h1>
  <p id="score">0 - 0</p>
  <input type="button" value="Start Game" onclick="createField(this)">

  <!-- Write JavaScript Code to manipulate the DOM-->
  <script>

    let table;
    let board;
    let wins;
    let turns; 
    let text;
    let aScore = 0;
    let bScore = 0;

    function createField(e)
    {
      board = ["-", "-", "-", "-", "-", "-", "-", "-", "-"];
      wins = [[1, 2, 3, 6, 4, 8], [0, 2, 4, 7], [1, 0, 5, 8, 4, 6], [0, 6, 4, 5], [1, 7, 3, 5, 0, 8, 2, 6], [2, 8, 3, 4], [0, 3, 7, 8, 4, 2], [6, 8, 1, 4], [2, 5, 6, 7, 0, 4]];
      turns = 0;

      let score = document.getElementById("score");
      score.setAttribute("style", "color: white;");

      text = document.body.appendChild(document.createElement("h2"));
      text.appendChild(document.createTextNode("Player A ist am Zug."));

      table = document.createElement("table");
      let tr;
      let td;

      for(let i = 0; i < 9; i++)
      {
        if(i % 3 == 0)
        {
          tr = table.appendChild(document.createElement("tr"));
        }
        td = tr.appendChild(document.createElement("td"));
        td.setAttribute("id", i);
        td.setAttribute("onclick", "playTurn(this)");
      }

      document.body.appendChild(table);
      document.body.removeChild(e);
    }

    function restart(e)
    {
      table.parentNode.removeChild(table);
      text.parentNode.removeChild(text);
      createField(e);
    }
    
    function playTurn(e)
    {
      let img = e.appendChild(document.createElement("img"));
      let id = parseInt(e.id);

      if(turns % 2 == 0)
      {
        img.setAttribute("src", "https://imiedit.f4.htw-berlin.de/onlineed/img/x.png");
        board[id] = "A";
        text.textContent = "Player B ist am Zug.";
      }

      else
      {
        img.setAttribute("src", "https://imiedit.f4.htw-berlin.de/onlineed/img/o.png");
        board[id] = "B";
        text.textContent = "Player A ist am Zug.";
      }

      e.setAttribute("class", "used");
      e.removeAttribute("onclick");
      turns++;

      if(turns >= 5)
      {
        let winCondition = wins[id];

        for(let i = 0; i < winCondition.length; i+=2)
        {
          if(board[id] === board[winCondition[i]])
          {
            if(board[id] === board[winCondition[i + 1]])
            {
              text.textContent = "Player " + board[id] + " hat gewonnen.";

              let element;
              for(let j = 0; j < 9; j++)
              {
                element = getElement(j);
                element.setAttribute("class", "used");
                element.removeAttribute("onclick");
              }

              getElement(id).setAttribute("class", "win");
              getElement(winCondition[i]).setAttribute("class", "win");
              getElement(winCondition[i + 1]).setAttribute("class", "win");

              if(board[id] === "A")
              {
                aScore++;
              }

              else
              {
                bScore++;
              }

              document.getElementById("score").textContent = aScore + " - " + bScore;

              createRestartButton();

              return;
            }
          }
        }
      }
      if(turns >= 9)
      {
        text.textContent = "Spiel vorbei. Unentschieden."
        createRestartButton();        
      }
    }

    function getElement(x)
    {
      return document.getElementById(x.toString());
    }

    function createRestartButton()
    {
        let button = document.createElement("input");
        button.setAttribute("type", "button");
        button.setAttribute("value", "Restart");
        button.setAttribute("onclick", "restart(this)");
        document.body.appendChild(button);
    }

  </script>
</body>

</html>
